<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Form - Student Entry</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', Arial, sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .header {
            background-color: #f9fafb;
            padding: 16px 24px;
            font-weight: 600;
            font-size: 18px;
            border-bottom: 1px solid #e5e7eb;
            color: #111827;
        }
        .main-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }
        .card {
            background-color: white;
            width: 100%;
            max-width: 500px;
            padding: 32px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        .form-group {
            margin-bottom: 24px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #374151;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 8px;
        }
        .radio-item {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        .radio-item label {
            margin-bottom: 0;
            font-weight: 400;
            color: #4b5563;
        }
        button {
            width: 100%;
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 12px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            transition: background-color 0.2s;
            margin-top: 8px;
        }
        button:hover {
            background-color: #1d4ed8;
        }
        .back-link {
            display: block;
            margin-top: 24px;
            color: #6b7280;
            text-decoration: none;
            font-size: 14px;
            text-align: center;
        }
        .back-link:hover {
            color: #111827;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="header">Form Input Mahasiswa</div>
<div class="main-container">
    <div class="card">
        <form action="/submit" method="post">
            <div class="form-group">
                <label>Nama Lengkap</label>
                <input type="text" name="nama" placeholder="Masukkan nama mahasiswa" required>
            </div>

            <div class="form-group">
                <label>Nomor Induk Mahasiswa (NIM)</label>
                <input type="text" name="nim" placeholder="Masukkan NIM" required>
            </div>

            <div class="form-group">
                <label>Jenis Kelamin</label>
                <div class="radio-group">
                    <label class="radio-item">
                        <input type="radio" name="jk" value="Laki-laki" required>
                        <label>Laki-laki</label>
                    </label>
                    <label class="radio-item">
                        <input type="radio" name="jk" value="Perempuan">
                        <label>Perempuan</label>
                    </label>
                </div>
            </div>

            <button type="submit">Simpan Data</button>
        </form>

        <a href="/home" class="back-link">Kembali ke Halaman Home</a>
    </div>
</div>

</body>
</html>
